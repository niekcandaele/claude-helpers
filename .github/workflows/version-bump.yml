name: Bump Version

on:
  push:
    branches: [main]
    paths-ignore:
      - 'plugins/*/.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Bump changed plugin versions
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          MARKETPLACE=".claude-plugin/marketplace.json"
          BUMPED=""

          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")

            # Skip if no files changed in this plugin dir
            if ! echo "$CHANGED" | grep -q "^plugins/$plugin_name/"; then
              continue
            fi

            PLUGIN_JSON="${plugin_dir}.claude-plugin/plugin.json"
            if [ ! -f "$PLUGIN_JSON" ]; then
              echo "No plugin.json found for $plugin_name, skipping"
              continue
            fi

            # Read and bump version
            VERSION=$(jq -r '.version' "$PLUGIN_JSON")
            IFS='.' read -r major minor patch <<< "$VERSION"
            NEW_VERSION="$major.$minor.$((patch + 1))"

            # Update plugin.json
            jq --arg v "$NEW_VERSION" '.version = $v' "$PLUGIN_JSON" > tmp.json \
              && mv tmp.json "$PLUGIN_JSON"

            # Update marketplace.json entry by name
            jq --arg name "$plugin_name" --arg v "$NEW_VERSION" \
              '(.plugins[] | select(.name == $name)).version = $v' \
              "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"

            echo "Bumped $plugin_name: $VERSION -> $NEW_VERSION"
            BUMPED="$BUMPED $plugin_name"
          done

          if [ -z "$BUMPED" ]; then
            echo "No plugins changed, skipping bump"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/*/.claude-plugin/ .claude-plugin/
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump plugin versions"
          git push
